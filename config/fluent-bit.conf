[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File parsers.conf

# ==========================================================
# INPUT: Domain-Specific Log Sources (Layer 1)
# ==========================================================

# Network telemetry (Suricata, firewall, IDS/IPS)
[INPUT]
    Name         tail
    Path         /var/log/apps/network/*.log
    Tag          log.network
    Refresh_Interval 1
    Parser       my_json_parser
    Mem_Buf_Limit 5MB
    Skip_Long_Lines On

# Endpoint telemetry (Sysmon, EDR, process events)
[INPUT]
    Name         tail
    Path         /var/log/apps/endpoint/*.log
    Tag          log.endpoint
    Refresh_Interval 1
    Parser       my_json_parser
    Mem_Buf_Limit 5MB
    Skip_Long_Lines On

# Identity telemetry (Active Directory, auth events)
[INPUT]
    Name         tail
    Path         /var/log/apps/identity/*.log
    Tag          log.identity
    Refresh_Interval 1
    Parser       my_json_parser
    Mem_Buf_Limit 5MB
    Skip_Long_Lines On

# Legacy catch-all (backwards compatibility)
[INPUT]
    Name         tail
    Path         /var/log/apps/app.log
    Tag          app.logs
    Refresh_Interval 1
    Parser       my_json_parser
    Mem_Buf_Limit 5MB
    Skip_Long_Lines On

# ==========================================================
# OUTPUT 1: Raw log archive (OpenSearch)
# Preserves complete raw evidence for forensic queries.
# ==========================================================
[OUTPUT]
    Name  opensearch
    Match *
    Host  opensearch-node
    Port  9200
    Index security-logs-raw
    tls   Off
    Suppress_Type_Name On
    HTTP_User admin
    HTTP_Passwd admin

# ==========================================================
# OUTPUT 2: AI Worker Edge Filtering (Layer 2)
# Routes domain-specific logs to dedicated AI Workers
# via the SOAR server relay.
# ==========================================================

# Network logs -> Network AI Worker
[OUTPUT]
    Name           http
    Match          log.network
    Host           soar-server
    Port           5000
    URI            /ingest/network
    Format         json

# Endpoint logs -> Endpoint AI Worker
[OUTPUT]
    Name           http
    Match          log.endpoint
    Host           soar-server
    Port           5000
    URI            /ingest/endpoint
    Format         json

# Identity logs -> Identity AI Worker
[OUTPUT]
    Name           http
    Match          log.identity
    Host           soar-server
    Port           5000
    URI            /ingest/identity
    Format         json

# Legacy catch-all -> Commander AI pipeline (direct)
[OUTPUT]
    Name           http
    Match          app.logs
    Host           soar-server
    Port           5000
    URI            /ingest
    Format         json